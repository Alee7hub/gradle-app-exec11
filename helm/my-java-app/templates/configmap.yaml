apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "my-java-app.configmapName" . }}
  labels:
    {{- include "my-java-app.labels" . | nindent 4 }}
data:
  DB_SERVER: {{ .Values.database.server | quote }}
  DB_NAME: {{ .Values.database.name | quote }}
  DB_USER: {{ .Values.database.user | quote }}
