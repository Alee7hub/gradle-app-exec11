# =============================================================
# EKS Values — my-java-app Helm Chart
# =============================================================
# Deploys the Java app on Fargate (via label selector) and
# phpMyAdmin on EC2 nodes (no Fargate label).
#
#   helm install my-app ./helm/my-java-app -f helm/eks-values.yaml
# =============================================================

# ── Replica count ────────────────────────────────────────────
replicaCount: 3

# ── Application image ────────────────────────────────────────
image:
  repository: 320806842529.dkr.ecr.eu-central-1.amazonaws.com/java-gradle-app-exec11
  tag: "3.5.10-9"
  pullPolicy: IfNotPresent

# ── ECR: no imagePullSecrets needed (IAM handles auth) ──────
imagePullSecrets: []

# ── Fargate scheduling ───────────────────────────────────────
# This label is added ONLY to the Java app pods.
# The Fargate profile must match:  namespace=default, labels: scheduling=fargate
# phpMyAdmin pods do NOT get this label → they stay on EC2.
podLabels:
  scheduling: fargate

# ── Service ───────────────────────────────────────────────────
service:
  type: LoadBalancer
  port: 8080

# ── Ingress ───────────────────────────────────────────────────
# Disabled — using LoadBalancer service to expose the app on EKS.
# Enable and configure if you install the AWS ALB Ingress Controller.
ingress:
  enabled: false

# ── Database connection — ConfigMap ──────────────────────────
database:
  server: mysql-primary
  name: mydb
  user: ali

# ── Database credentials — Secret ────────────────────────────
# Pass real passwords at deploy time:
#   helm install ... --set secrets.mysqlPassword=<real>
secrets:
  mysqlRootPassword: "change-me-root"
  mysqlPassword: "change-me-password"
  mysqlReplicationPassword: "change-me-repl"

# ── phpMyAdmin ───────────────────────────────────────────────
# Runs on EC2 (no Fargate label on its pods).
phpmyadmin:
  enabled: true
  image:
    repository: phpmyadmin
    tag: "5.2"
    pullPolicy: IfNotPresent
  service:
    type: LoadBalancer
    port: 8081
