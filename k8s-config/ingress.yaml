apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: my-java-app-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: my-java-app.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: my-java-app-service
                port:
                  number: 8080
